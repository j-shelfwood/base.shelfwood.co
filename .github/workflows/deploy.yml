name: Deploy to base.shelfwood.co

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Coolify-Token: ${{ secrets.COOLIFY_WEBHOOK_TOKEN }}" \
            https://infrastructure.shelfwood.co/api/v1/deploy?uuid=z14ejyc6xhaakfu429j1d3dv\&force=false
